

<div class=" container mt-4">

<form class="form" [formGroup]="fileform" (ngSubmit)="onSubmit()">

  <div>
    <label >Country</label>
    <select class="form-control form-control-sm w-50 mt-1" formControlName="countryId" (change)="onCountryChange($event)">
      <option value="">Select Country</option>

      @for(country of countryResponse(); track country.id){
        <option [value]="country.id">
          {{country.countryName}}
        </option>
      }

    </select>
  </div>


  <div>
    <label>State</label>
    <select  class="form-control form-control-sm w-50 mt-1" formControlName="stateId">
      <option value="">Select State</option>

      @for(state of states; track state.id){
        <option [value]="state.id">
          {{state.stateName}}
        </option>
      }

    </select>
  </div>


  <div class="mt-3" >
    <label class="m-2" >File </label>
    <input  type="file" (change)="onFileSelected($event)">
  </div>

  <button class="mt-3 btn btn-primary btn-sm" type="submit">Upload</button>

</form>
</div>
