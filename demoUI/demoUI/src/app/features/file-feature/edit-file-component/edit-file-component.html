<div class="container mt-4">

    <form [formGroup]="editfileForm" (ngSubmit)="onSubmit()">

        <!-- Country -->
        <div>
            <label>Country</label>

            <select class="form-control form-control-sm w-50 mt-1" formControlName="countryId"
                (change)="onCountryChange($event)">

                <option value="">Select Country</option>

                @for(country of countryResponse(); track country.id){
                <option [value]="country.id">
                    {{country.countryName}}
                </option>
                }

            </select>

        </div>


        <!-- State -->
        <div>

            <label>State</label>

            <select class="form-control form-control-sm w-50 mt-1 mb-3" formControlName="stateId">

                <option value="">Select State</option>

                @for(state of states; track state.id){
                <option [value]="state.id">
                    {{state.stateName}}
                </option>
                }

            </select>

        </div>


        <!-- File Upload -->
        <div>

            <label class="p-2">Upload File</label>

            <input type="file" (change)="onFileSelected($event)" />

        </div>


        <!-- Current File -->
        @if(fileResponse()){
        <div class="mt-3">
            Current File :
            <a class="bg-body-secondary" [href]="fileResponse()?.fileUrl" target="_blank">
                {{fileResponse()?.fileName}}
            </a>
        </div>
        }

        <div class="d-flex gap-2">
            <button class="mt-3 btn btn-primary btn-sm" type="submit">Update</button>
            <button class="mt-3 btn btn-danger btn-sm" type="button"  (click)="onDelete()">Delete</button>
        </div>



    </form>
</div>
