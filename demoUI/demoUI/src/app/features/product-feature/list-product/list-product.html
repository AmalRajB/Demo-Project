<div class="container">
    <h1 class="mt-4 text-primary">Product List</h1>


    <div class="d-flex justify-content-end">
        <form [formGroup]="form" class="w-45">
            <select class="form-control" formControlName="category">
                <option value="">All</option>

                @for (category of categoryResponse(); track category.id) {
                <option [value]="category.id">{{ category.categoryName }}</option>
                }
            </select>
        </form>
    </div>

    @if(productResponse()?.length === 0) {

    <div class=" d-flex justify-content-center mt-5 alert alert-info">
        Selected category has no products yet
    </div>

    }@else {

    <table class="table mt-3">
        <thead class="thead-dark">
            <tr>
                <th scope="col">Product Name</th>
                <th scope="col">Product Price</th>
                <th scope="col">Category</th>
                <th scope="col">Action</th>
            </tr>
        </thead>
        <tbody>
            @for (product of productResponse(); track product.id) {
            <tr>

                <td>{{product.productName}}</td>
                <td>{{product.productPrice}}</td>
                <td>{{product.category.categoryName}}</td>
                <td>

                    <a class="btn btn-sm btn-secondary" [routerLink]="['/admin/product/edit/', product.id]">

                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                            class="bi bi-pencil-square" viewBox="0 0 16 16">
                            <path
                                d="M15.502 1.94a.5.5 0 0 1 0 .706L14.459 3.69l-2-2L13.502.646a.5.5 0 0 1 .707 0l1.293 1.293zm-1.75 2.456-2-2L4.939 9.21a.5.5 0 0 0-.121.196l-.805 2.414a.25.25 0 0 0 .316.316l2.414-.805a.5.5 0 0 0 .196-.12l6.813-6.814z" />
                            <path fill-rule="evenodd"
                                d="M1 13.5A1.5 1.5 0 0 0 2.5 15h11a1.5 1.5 0 0 0 1.5-1.5v-6a.5.5 0 0 0-1 0v6a.5.5 0 0 1-.5.5h-11a.5.5 0 0 1-.5-.5v-11a.5.5 0 0 1 .5-.5H9a.5.5 0 0 0 0-1H2.5A1.5 1.5 0 0 0 1 2.5z" />
                        </svg>
                    </a>
                </td>
            </tr>
            }
        </tbody>
    </table>

    }

</div>
