<div class="container">
    <h2 class="mt-4">Edit Product</h2>
    <form [formGroup]="editform" (ngSubmit)="onSubmit()">
        <div class="mt-3">
            <label for="statename" class="form-label">Product Name</label>
            <input type="text" class="form-control" formControlName="productName" />
        </div>
        <div class="mt-3">
            <label for="statename" class="form-label">Product Price</label>
            <input type="text" class="form-control" formControlName="productPrice" />
        </div>

        <div class="mt-3">
            <label class="form-label">Category</label>
            <select class="form-control" formControlName="categoryId">
                @for (category of categoryResponse(); track category.id) {
                <option [value]="category.id">{{ category.categoryName }}</option>
                }
            </select>

        </div>

        <div class="d-flex gap-3">
            <button type="submit" class="btn btn-primary btn-sm mt-3"
                [disabled]="editform.valid===false">Update</button>
            <button type="button" class="btn btn-danger btn-sm mt-3" (click)="onDelete()">Delete</button>
        </div>
    </form>
</div>
