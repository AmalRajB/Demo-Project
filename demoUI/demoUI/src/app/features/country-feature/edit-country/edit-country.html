<div class="container">
    <h2 class="mt-4">Edit Country</h2>
    <form [formGroup]="editCountryGroup" (ngSubmit)="onSubmit()">
        <div class="mt-3">
            <label for="categoryName" class="form-label">Country Name</label>
            <input type="text" class="form-control" formControlName="countryName" />

            @if(countryNameFormControl.touched && countryNameFormControl.hasError('required')){
            <p class="text-danger small">this field is required</p>
            }
            @if(countryNameFormControl.touched && countryNameFormControl.hasError('maxlength')){
            <p class="text-danger small">this field must be less than 20 characters</p>
            }
        </div>
        <div class="d-flex gap-3"> <button type="submit" class="btn btn-success mt-3"
                [disabled]="editCountryGroup.valid===false">Edit</button>
            <button type="button" class="btn btn-danger mt-3" (click)="onDelete()">delete</button>
        </div>

    </form>

</div>
