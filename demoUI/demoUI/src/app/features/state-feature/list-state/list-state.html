<div class="container">

    <div class="d-flex justify-content-end mt-3">
        <!-- <a class="btn btn-primary mb-3" [routerLink]="['/admin/blogposts/add']">Create New Blogpost</a> -->
    </div>


    <div>
        @if(isLoading()) {
        <div class="d-flex justify-content-center mt-5">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
        }@else{
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>StateName</th>
                    <th>Country</th>

                </tr>
            </thead>

            <tbody>
                @for (data of states(); track data.id) {
                <tr>
                    <td>{{ data.id }}</td>
                    <td>{{ data.stateName }}</td>
                    <td>{{data.country.countryName}}</td>


                    <td><a class="btn btn-sm btn-secondary" [routerLink]="['/admin/editstate/', data.id]">Edit</a></td>
                </tr>
                }
            </tbody>
        </table>

        <div class="d-flex justify-content-center mt-3">

            <button class="btn btn-outline-primary me-2" (click)="previousPage()" [disabled]="pageNumber() === 1">
                Previous
            </button>

            <span class="align-self-center">
                Page {{pageNumber()}} of {{totalPages()}}
            </span>

            <button class="btn btn-outline-primary ms-2" (click)="nextPage()"
                [disabled]="pageNumber() === totalPages()">
                Next
            </button>

        </div>



        }

    </div>
</div>
