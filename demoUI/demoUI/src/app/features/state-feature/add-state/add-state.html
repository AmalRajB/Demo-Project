<div class="container">
    <h2 class="mt-4">Add Country</h2>
    <form [formGroup]="addStateForm" (ngSubmit)="onSubmit()">
        <div class="mt-3">
            <label for="statename" class="form-label">state Name</label>
            <input type="text" class="form-control" formControlName="StateName" />
        </div>
        <div class="mb-3">
            <label class="form-label">Country</label>
            <select class="form-control" formControlName="country">
                @for (country of countryResponse(); track country.id) {
                    <option [value]="country.id">{{ country.countryName }}</option>
                }
            </select>  

        </div>

        <button type="submit" class="btn btn-success mt-3"
            [disabled]="addStateForm.valid===false">Submit</button>

    </form>

</div>
