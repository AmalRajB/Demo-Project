<div class="container">
    <h2 class="mt-4">Add Country</h2>
    <form [formGroup]="editStateForm" (ngSubmit)="onSubmit()">
        <div class="mt-3">
            <label for="statename" class="form-label">state Name</label>
            <input type="text" class="form-control" formControlName="StateName" />
        </div>
        <div class="mb-3">
            <label class="form-label">Country</label>
            <select class="form-control" formControlName="country">
                @for (country of countryResponse(); track country.id) {
                <option [value]="country.id">{{ country.countryName }}</option>
                }
            </select>

        </div>
        <div class="d-flex gap-3">
            <button type="submit" class="btn btn-success mt-3" [disabled]="editStateForm.valid===false">Submit</button>
            <button type="button" class="btn btn-danger mt-3" (click)="onDeleteState()">delete</button>

        </div>

    </form>

</div>
