<div class="container">
    <h2 class="mt-4">Add ProductCategory</h2>
    <form [formGroup]="addCategoryForm" (ngSubmit)="onSubmit()">
        <div class="mt-3">
            <label for="categoryName" class="form-label">Category Name</label>
            <input type="text" class="form-control w-50" formControlName="categoryName" />
 
            @if(categoryNameControlForm.touched && categoryNameControlForm.hasError('required')){
            <p class="text-danger small">this field is required</p>
            }
            @if(categoryNameControlForm.touched && categoryNameControlForm.hasError('maxlength')){
            <p class="text-danger small">this field must be less than 50 characters</p>
            }
           
        </div>

        <button type="submit" class="btn btn-success mt-3"
            [disabled]="addCategoryForm.valid===false">Submit</button>

    </form>

</div>
